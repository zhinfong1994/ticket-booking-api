openapi: 3.0.3
info:
  title: Ticket Booking System API
  version: 1.0.0

servers:
  - url: http://localhost:3000

tags:
  - name: Auth
  - name: Events
  - name: Venues
  - name: Tickets
  - name: Orders

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /venues:
    post:
      tags: [Venues]
      summary: Create venue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVenueRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Venue'

    get:
      tags: [Venues]
      summary: List venues
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Venue'

  /events:
    post:
      tags: [Events]
      summary: Create event (unique venue + datetime)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '201':
          description: Created
        '409':
          description: Duplicate event

    get:
      tags: [Events]
      summary: List events
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'

  /tickets:
    get:
      tags: [Tickets]
      summary: Get tickets by event
      parameters:
        - name: eventId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'

  /orders:
    post:
      tags: [Orders]
      summary: Create order (prevent race condition)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Reserved
        '409':
          description: Ticket conflict

    get:
      tags: [Orders]
      summary: Get orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/{id}/confirm:
    patch:
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Confirmed

  /orders/{id}/cancel:
    patch:
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancelled

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        passwordHash:
          type: string

    Venue:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string

    CreateVenueRequest:
      type: object
      required: [name, location]
      properties:
        name:
          type: string
        location:
          type: string

    Event:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        venueId:
          type: string
        datetime:
          type: string
          format: date-time
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    CreateEventRequest:
      type: object
      required: [name, venueId, datetime]
      properties:
        name:
          type: string
        venueId:
          type: string
        datetime:
          type: string
          format: date-time

    Ticket:
      type: object
      properties:
        id:
          type: string
        eventId:
          type: string
        seatNumber:
          type: string
        status:
          type: string
          enum: [AVAILABLE, RESERVED, SOLD]

    Order:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        ticketIds:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED]
        expiresAt:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required: [ticketIds]
      properties:
        ticketIds:
          type: array
          items:
            type: string